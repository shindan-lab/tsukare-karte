<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <link rel="canonical" href="https://shindan-lab.github.io/tsukare-karte/">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><rect width='24' height='24' rx='5' fill='%23FAF7F4'/><path d='M9,2 H15 L15,9 L22,20 A2,2 0 0 1 20,23 H4 A2,2 0 0 1 2,20 L9,9 Z' fill='%23C1714A'/><rect x='7.5' y='1' width='9' height='2' rx='1' fill='%23A85D38'/><path d='M12,21 C10,19 8,17 8,14 A2,2 0 0 1 12,14 A2,2 0 0 1 16,14 C16,17 14,19 12,21 Z' fill='white'/></svg>">
  <meta name="theme-color" content="#C1714A">
  <!-- OGP（SNSシェア用） -->
  <meta property="og:title" content="疲れのカルテ｜「なんか疲れた」の正体、わかります。">
  <meta property="og:description" content="20の質問で疲れのタイプがわかります。育児・家事・仕事の両立層のための診断ツール。所要時間約3分。">
  <meta property="og:url" content="https://shindan-lab.github.io/tsukare-karte/">
  <meta property="og:type" content="website">
  <meta property="og:locale" content="ja_JP">
  <meta property="og:site_name" content="疲れのカルテ">
  <meta property="og:image" content="https://shindan-lab.github.io/tsukare-karte/og-image.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="疲れのカルテ｜「なんか疲れた」の正体、わかります。">
  <meta name="twitter:description" content="20の質問で疲れのタイプがわかります。育児・家事・仕事の両立層のための診断ツール。">
  <meta name="twitter:image" content="https://shindan-lab.github.io/tsukare-karte/og-image.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Noto Sans JP', 'Hiragino Kaku Gothic ProN', sans-serif;
      background-color: #FAF7F4;
      color: #3D2B1F;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      /* iOSノッチ・ホームバー対応 */
      padding-top: env(safe-area-inset-top, 0px);
      padding-bottom: env(safe-area-inset-bottom, 0px);
    }

    .container {
      width: 100%;
      max-width: 480px;
      padding: 24px 16px;
      /* iOSホームバー分の余白を追加 */
      padding-bottom: max(48px, calc(24px + env(safe-area-inset-bottom, 0px)));
      min-height: 100vh;
    }

    /* ===== 画面 ===== */
    .screen { display: none; }
    .screen.active { display: block; }

    /* ===== トップ画面 ===== */
    #screen-top {
      text-align: center;
      padding-top: 48px;
    }

    .top-logo {
      font-size: 12px;
      color: #C1714A;
      letter-spacing: 0.18em;
      font-weight: 500;
      margin-bottom: 12px;
      text-decoration: none;
      display: block;
    }

    .top-title {
      font-size: 32px;
      font-weight: 700;
      color: #3D2B1F;
      margin-bottom: 10px;
      line-height: 1.3;
    }

    .top-subtitle {
      font-size: 17px;
      color: #C1714A;
      font-weight: 500;
      margin-bottom: 32px;
      line-height: 1.6;
    }

    .top-desc-card {
      background: #FFFFFF;
      border-radius: 16px;
      border: 1px solid #E8D5CE;
      padding: 24px 20px;
      box-shadow: 0 2px 12px rgba(193,113,74,0.08);
      margin-bottom: 32px;
      text-align: left;
    }

    .top-desc {
      font-size: 15px;
      color: #7A5C52;
      line-height: 1.8;
    }

    .top-desc .time-badge {
      display: inline-block;
      background: #FDF0EB;
      border: 1px solid #E8D5CE;
      border-radius: 20px;
      padding: 4px 14px;
      font-size: 13px;
      color: #C1714A;
      font-weight: 500;
      margin-top: 12px;
    }

    .btn-start {
      display: block;
      width: 100%;
      padding: 18px 16px;
      background: #C1714A;
      border: none;
      border-radius: 14px;
      font-size: 17px;
      font-weight: 700;
      font-family: 'Noto Sans JP', sans-serif;
      color: #FFFFFF;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.05em;
      min-height: 44px;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }

    .btn-start:hover {
      background: #A85D38;
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(193,113,74,0.3);
    }

    /* ===== 診断画面 ===== */
    #screen-quiz { padding-top: 20px; }

    .progress-header { margin-bottom: 12px; }

    .progress-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .progress-num {
      font-size: 13px;
      color: #7A5C52;
      font-weight: 500;
    }

    .progress-bar-wrap {
      height: 4px;
      background: #E8D5CE;
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: #C1714A;
      border-radius: 2px;
      transition: width 0.3s ease;
    }

    /* 戻るボタン */
    .quiz-nav {
      min-height: 40px;
      display: flex;
      align-items: center;
      margin-bottom: 8px;
    }

    .btn-back {
      background: none;
      border: none;
      color: #7A5C52;
      font-size: 13px;
      font-family: 'Noto Sans JP', sans-serif;
      cursor: pointer;
      padding: 8px 0;
      display: flex;
      align-items: center;
      gap: 5px;
      opacity: 0.75;
      transition: opacity 0.2s, color 0.2s;
      min-height: 44px;
    }

    .btn-back:hover:not(:disabled) {
      opacity: 1;
      color: #C1714A;
    }

    .btn-back:disabled {
      opacity: 0.2;
      cursor: default;
    }

    .btn-back svg {
      flex-shrink: 0;
    }

    .question-card {
      background: #FFFFFF;
      border-radius: 16px;
      border: 1px solid #E8D5CE;
      padding: 28px 24px;
      box-shadow: 0 2px 12px rgba(193,113,74,0.08);
    }

    .question-text {
      font-size: 17px;
      font-weight: 700;
      color: #3D2B1F;
      line-height: 1.65;
      margin-bottom: 24px;
    }

    .options-list { list-style: none; }

    .option-btn {
      display: block;
      width: 100%;
      padding: 14px 16px;
      margin-bottom: 10px;
      background: #FAF7F4;
      border: 1.5px solid #E8D5CE;
      border-radius: 12px;
      font-size: 15px;
      font-family: 'Noto Sans JP', sans-serif;
      color: #3D2B1F;
      text-align: left;
      cursor: pointer;
      transition: all 0.2s;
      line-height: 1.5;
      min-height: 44px;
      /* スマホ長押しメニュー抑制 */
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }

    .option-btn:last-child { margin-bottom: 0; }

    .option-btn:hover:not(:disabled) {
      background: #FDF0EB;
      border-color: #C1714A;
    }

    .option-btn.selected {
      background: #FDF0EB;
      border-color: #C1714A;
      color: #C1714A;
      font-weight: 500;
    }

    .option-btn:disabled { cursor: default; }

    /* ===== 集計中画面 ===== */
    #screen-loading {
      display: none;
      text-align: center;
      padding-top: 100px;
    }

    #screen-loading.active { display: block; }

    .loading-spinner {
      width: 48px;
      height: 48px;
      border: 4px solid #E8D5CE;
      border-top-color: #C1714A;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
      margin: 0 auto 24px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text {
      font-size: 16px;
      color: #7A5C52;
      font-weight: 500;
    }

    /* ===== 結果画面 ===== */
    #screen-result {
      padding-top: 20px;
      padding-bottom: 48px;
    }

    /* 結果ヘッダーカード */
    .result-header-card {
      border-radius: 20px;
      padding: 36px 24px 32px;
      text-align: center;
      margin-bottom: 16px;
      position: relative;
      overflow: hidden;
      color: #FFFFFF;
    }

    .result-header-bg-letter {
      position: absolute;
      font-size: 200px;
      font-weight: 900;
      color: rgba(255,255,255,0.1);
      top: -40px;
      right: -16px;
      line-height: 1;
      pointer-events: none;
      user-select: none;
    }

    .result-header-icon {
      width: 60px;
      height: 60px;
      margin: 0 auto 16px;
      position: relative;
      z-index: 1;
    }

    .result-header-eyebrow {
      font-size: 11px;
      letter-spacing: 0.18em;
      color: rgba(255,255,255,0.85);
      margin-bottom: 8px;
      font-weight: 500;
      position: relative;
      z-index: 1;
    }

    .result-type-name {
      font-size: 24px;
      font-weight: 700;
      color: #FFFFFF;
      line-height: 1.3;
      position: relative;
      z-index: 1;
    }

    /* 結果コンテンツ */
    .result-section {
      background: #FFFFFF;
      border-radius: 16px;
      border: 1px solid #E8D5CE;
      padding: 22px 20px;
      box-shadow: 0 2px 12px rgba(193,113,74,0.08);
      margin-bottom: 14px;
    }

    .result-section-label {
      font-size: 10px;
      font-weight: 700;
      color: #C1714A;
      letter-spacing: 0.15em;
      margin-bottom: 12px;
    }

    .result-headline {
      font-size: 14px;
      font-weight: 700;
      color: #3D2B1F;
      line-height: 1.7;
      margin-bottom: 14px;
      padding-bottom: 14px;
      border-bottom: 1px solid #F0E4DE;
    }

    .result-body {
      font-size: 14px;
      color: #3D2B1F;
      line-height: 1.9;
    }

    .result-body p + p { margin-top: 14px; }

    .result-letter-section {
      background: #FDF0EB;
      border: 1px solid #E8D5CE;
      border-radius: 16px;
      padding: 22px 20px;
      margin-bottom: 14px;
    }

    .result-letter-label {
      font-size: 10px;
      font-weight: 700;
      color: #C1714A;
      letter-spacing: 0.15em;
      margin-bottom: 12px;
    }

    .result-letter {
      font-size: 14px;
      color: #3D2B1F;
      line-height: 1.9;
    }

    .result-prescription-section {
      background: #FFFFFF;
      border-radius: 16px;
      border: 2px solid #C1714A;
      padding: 22px 20px;
      margin-bottom: 14px;
    }

    .result-prescription-label {
      font-size: 10px;
      font-weight: 700;
      color: #C1714A;
      letter-spacing: 0.15em;
      margin-bottom: 12px;
    }

    .result-prescription {
      font-size: 14px;
      color: #3D2B1F;
      line-height: 1.9;
      font-weight: 500;
    }

    .result-sub-type {
      font-size: 13px;
      color: #7A5C52;
      text-align: center;
      margin-bottom: 24px;
      padding: 10px 16px;
      background: #FFFFFF;
      border: 1px solid #E8D5CE;
      border-radius: 10px;
    }

    /* シェア */
    .share-section { text-align: center; }

    .share-label {
      font-size: 13px;
      color: #7A5C52;
      margin-bottom: 14px;
    }

    .share-buttons {
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    .btn-share {
      flex: 1;
      max-width: 180px;
      padding: 13px 10px;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-family: 'Noto Sans JP', sans-serif;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      min-height: 44px;
      background: #1A1A1A;
      color: #FFFFFF;
    }

    .btn-share:hover { background: #333; }

    .btn-retry {
      display: block;
      width: 100%;
      padding: 15px 16px;
      margin-top: 12px;
      background: transparent;
      border: 1.5px solid #E8D5CE;
      border-radius: 12px;
      font-size: 14px;
      font-family: 'Noto Sans JP', sans-serif;
      color: #7A5C52;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      min-height: 44px;
    }

    .btn-retry:hover {
      border-color: #C1714A;
      color: #C1714A;
    }

    /* ===== アニメーション ===== */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .fade-in { animation: fadeInUp 0.3s ease forwards; }

    @media (max-width: 375px) {
      .top-title { font-size: 28px; }
      .question-card { padding: 22px 18px; }
    }

    /* ===== 診断Lab フッター ===== */
    .site-footer {
      margin-top: 56px;
      padding: 28px 0 20px;
      text-align: center;
      border-top: 1px solid #E8D5CE;
    }

    .footer-logo-wrap {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
      text-decoration: none;
    }

    .footer-brand-name {
      font-size: 17px;
      font-weight: 700;
      color: #3D2B1F;
      letter-spacing: 0.04em;
    }

    .footer-brand-name em {
      font-style: normal;
      color: #C1714A;
    }

    .footer-tagline {
      font-size: 12px;
      color: #7A5C52;
      margin-bottom: 14px;
      letter-spacing: 0.03em;
    }

    .footer-copy {
      font-size: 11px;
      color: #B0978E;
    }

    /* ===== アフィリエイトセクション ===== */
    .result-affiliate-section {
      background: #FFFFFF;
      border-radius: 16px;
      border: 1px solid #E8D5CE;
      padding: 18px 20px;
      box-shadow: 0 2px 12px rgba(193,113,74,0.08);
      margin-bottom: 14px;
    }

    .affiliate-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }

    .affiliate-section-label {
      font-size: 10px;
      font-weight: 700;
      color: #7A5C52;
      letter-spacing: 0.15em;
    }

    .affiliate-pr-badge {
      font-size: 9px;
      font-weight: 700;
      color: #B0978E;
      background: #F0E4DE;
      padding: 2px 6px;
      border-radius: 3px;
      letter-spacing: 0.05em;
    }

    .affiliate-card-link {
      display: block;
      background: #FAF7F4;
      border-radius: 10px;
      padding: 14px 16px;
      text-decoration: none;
      transition: background 0.2s, border-color 0.2s;
      border: 1px solid transparent;
    }

    .affiliate-card-link:hover {
      background: #FDF0EB;
      border-color: #E8D5CE;
    }

    .affiliate-card-title {
      font-size: 14px;
      font-weight: 700;
      color: #3D2B1F;
      margin-bottom: 5px;
      line-height: 1.5;
    }

    .affiliate-card-desc {
      font-size: 13px;
      color: #7A5C52;
      line-height: 1.7;
      margin-bottom: 10px;
    }

    .affiliate-card-cta {
      font-size: 12px;
      font-weight: 700;
      color: #BF4500;
    }
  </style>
</head>
<body>
<div class="container">

  <!-- トップ画面 -->
  <div id="screen-top" class="screen active">
    <a class="top-logo" href="https://shindan-lab.github.io/">診断ツール</a>
    <h1 class="top-title">疲れのカルテ</h1>
    <p class="top-subtitle">「なんか疲れた」の正体、わかります。</p>

    <div class="top-desc-card">
      <p class="top-desc">
        20の質問に答えるだけで、<br>
        あなたの疲れのタイプがわかります。
      </p>
      <span class="time-badge">所要時間：約3分</span>
    </div>

    <button class="btn-start" onclick="startQuiz()">診断をはじめる</button>
  </div>

  <!-- 診断画面 -->
  <div id="screen-quiz" class="screen">
    <div class="progress-header">
      <div class="progress-label">
        <span class="progress-num" id="progress-text">1 / 20</span>
      </div>
      <div class="progress-bar-wrap">
        <div class="progress-bar-fill" id="progress-bar" style="width:5%"></div>
      </div>
    </div>

    <div class="quiz-nav">
      <button class="btn-back" id="btn-back" onclick="goBack()" disabled>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M15 18l-6-6 6-6"/>
        </svg>
        前の問題に戻る
      </button>
    </div>

    <div class="question-card fade-in" id="question-card">
      <p class="question-text" id="question-text"></p>
      <ul class="options-list" id="options-list"></ul>
    </div>
  </div>

  <!-- 集計中画面 -->
  <div id="screen-loading" class="screen">
    <div class="loading-spinner"></div>
    <p class="loading-text">あなたの疲れを分析中…</p>
  </div>

  <!-- 結果画面 -->
  <div id="screen-result" class="screen">
    <div class="result-header-card" id="result-header-card">
      <div class="result-header-bg-letter" id="result-bg-letter"></div>
      <div class="result-header-icon" id="result-icon"></div>
      <div class="result-header-eyebrow">あなたの疲れのタイプ</div>
      <h2 class="result-type-name" id="result-type-name"></h2>
    </div>

    <div class="result-section">
      <div class="result-section-label">診断結果</div>
      <p class="result-headline" id="result-headline"></p>
      <div class="result-body" id="result-body"></div>
    </div>

    <div class="result-letter-section">
      <div class="result-letter-label">あなたへ</div>
      <div class="result-letter" id="result-letter"></div>
    </div>

    <div class="result-prescription-section">
      <div class="result-prescription-label">今日からできること</div>
      <div class="result-prescription" id="result-prescription"></div>
    </div>

    <!-- アフィリエイト（URLが設定されたタイプのみ表示） -->
    <div class="result-affiliate-section" id="result-affiliate" style="display:none">
      <div class="affiliate-header">
        <span class="affiliate-section-label">もし気になったら</span>
        <span class="affiliate-pr-badge">PR</span>
      </div>
      <a class="affiliate-card-link" id="affiliate-link" href="#" target="_blank" rel="noopener noreferrer">
        <div class="affiliate-card-title" id="affiliate-title"></div>
        <div class="affiliate-card-desc" id="affiliate-desc"></div>
        <div class="affiliate-card-cta">楽天で見る →</div>
      </a>
    </div>

    <div class="share-section">
      <p class="share-label">結果をシェアする</p>
      <div class="share-buttons">
        <a id="share-x" href="#" target="_blank" rel="noopener noreferrer" class="btn-share">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.742l7.73-8.835L1.254 2.25H8.08l4.261 5.632zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
          Xでシェア

// ===== 状態管理 =====
let currentQuestion = 0;
let answers = [];
let isAnswering = false;

// ===== スコア計算 =====
function calcResult(answerList) {
  const scores = { A:0,B:0,C:0,D:0,E:0,F:0,G:0,H:0,I:0,J:0 };
  answerList.forEach(ans => {
    Object.entries(ans.scores).forEach(([type, pt]) => { scores[type] += pt; });
  });
  const sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]);
  return { main: sorted[0][0], sub: sorted[1][0] };
}

// ===== シェアテキスト =====
function getShareText(mainType) {
  const url = 'https://shindan-lab.github.io/tsukare-karte/';
  return `わたしは「${types[mainType].name}」でした。\nあなたの疲れの正体は？\n\n▼疲れのカルテ\n${url}\n\n#疲れのカルテ #診断`;
}

// ===== 画面切り替え =====
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo({ top: 0, behavior: 'instant' });
}

// ===== 問題表示 =====
function renderQuestion(index) {
  const q = questions[index];
  const total = questions.length;

  document.getElementById('progress-text').textContent = `${index + 1} / ${total}`;
  document.getElementById('progress-bar').style.width = `${((index + 1) / total) * 100}%`;
  document.getElementById('question-text').textContent = q.text;

  const list = document.getElementById('options-list');
  list.innerHTML = '';
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.textContent = opt.text;
    btn.addEventListener('click', () => selectOption(i));
    list.appendChild(btn);
  });

  // 戻るボタン制御
  document.getElementById('btn-back').disabled = (index === 0);

  // フェードアニメーション
  const card = document.getElementById('question-card');
  card.classList.remove('fade-in');
  void card.offsetWidth;
  card.classList.add('fade-in');
}

// ===== 選択肢タップ =====
function selectOption(optionIndex) {
  if (isAnswering) return;
  isAnswering = true;

  const buttons = document.querySelectorAll('.option-btn');
  buttons.forEach(btn => btn.disabled = true);
  buttons[optionIndex].classList.add('selected');
  document.getElementById('btn-back').disabled = true;

  answers.push(questions[currentQuestion].options[optionIndex]);

  setTimeout(() => {
    currentQuestion++;
    if (currentQuestion < questions.length) {
      renderQuestion(currentQuestion);
      isAnswering = false;
    } else {
      showLoading();
    }
  }, 300);
}

// ===== 前の問題に戻る =====
function goBack() {
  if (currentQuestion === 0 || isAnswering) return;
  currentQuestion--;
  answers.pop();
  renderQuestion(currentQuestion);
}

// ===== ローディング =====
function showLoading() {
  showScreen('screen-loading');
  setTimeout(showResult, 1500);
}

// affiliateData は affiliate.js で定義（リポジトリ内の別ファイルで管理）

// ===== 結果表示 =====
function showResult() {
  const result = calcResult(answers);
  const mainType = types[result.main];
  // ヘッダーカード
  const headerCard = document.getElementById('result-header-card');
  headerCard.style.background = typeColors[result.main].gradient;
  document.getElementById('result-bg-letter').textContent = result.main;
  document.getElementById('result-icon').innerHTML = typeIcons[result.main];
  document.getElementById('result-type-name').textContent = mainType.name;

  // コンテンツ
  document.getElementById('result-headline').textContent = mainType.headline;
  const bodyEl = document.getElementById('result-body');
  bodyEl.innerHTML = mainType.body.split('\n\n').map(p => `<p>${p}</p>`).join('');
  document.getElementById('result-letter').textContent = mainType.letter;
  document.getElementById('result-prescription').textContent = mainType.prescription;

  // アフィリエイトセクション
  const affiliate = affiliateData[result.main];
  const affSection = document.getElementById('result-affiliate');
  if (affiliate && affiliate.url) {
    document.getElementById('affiliate-title').textContent = affiliate.title;
    document.getElementById('affiliate-desc').textContent = affiliate.desc;
    document.getElementById('affiliate-link').href = affiliate.url;
    affSection.style.display = 'block';
  } else {
    affSection.style.display = 'none';
  }

  // シェアリンク
  const shareText = getShareText(result.main);
  document.getElementById('share-x').href =
    'https://twitter.com/intent/tweet?text=' + encodeURIComponent(shareText);
  document.getElementById('share-threads').href =
    'https://www.threads.net/intent/post?text=' + encodeURIComponent(shareText);

  showScreen('screen-result');
}

// ===== 診断スタート =====
function startQuiz() {
  currentQuestion = 0;
  answers = [];
  isAnswering = false;
  showScreen('screen-quiz');
  renderQuestion(0);
}

// ===== リセット =====
function resetQuiz() {
  showScreen('screen-top');
}
