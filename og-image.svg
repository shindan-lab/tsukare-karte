<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">

  <!-- 背景 -->
  <rect width="1200" height="630" fill="#FAF7F4"/>

  <!-- 上部アクセントバー -->
  <rect width="1200" height="10" fill="#C1714A"/>

  <!-- 下部アクセントバー -->
  <rect y="620" width="1200" height="10" fill="#C1714A"/>

  <!-- メインカード -->
  <rect x="100" y="55" width="1000" height="520" rx="28" fill="#FFFFFF" stroke="#E8D5CE" stroke-width="2"/>

  <!-- 大型フラスコ（右奥に透過装飾） -->
  <g transform="translate(830, 60) scale(9)" opacity="0.04">
    <path d="M9,2 H15 L15,9 L22,20 A2,2 0 0 1 20,23 H4 A2,2 0 0 1 2,20 L9,9 Z" fill="#C1714A"/>
  </g>

  <!-- ────── 診断Lab ロゴ（カード左上） ────── -->
  <!-- フラスコアイコン scale×1.8 -->
  <g transform="translate(148, 88) scale(1.8)">
    <path d="M9,2 H15 L15,9 L22,20 A2,2 0 0 1 20,23 H4 A2,2 0 0 1 2,20 L9,9 Z" fill="#C1714A"/>
    <rect x="7.5" y="1" width="9" height="2" rx="1" fill="#A85D38"/>
    <path d="M12,21 C10,19 8,17 8,14 A2,2 0 0 1 12,14 A2,2 0 0 1 16,14 C16,17 14,19 12,21 Z" fill="white"/>
  </g>
  <!-- 「診断Lab」テキスト -->
  <text x="197" y="118"
    font-family="'Hiragino Kaku Gothic ProN','Yu Gothic UI','Meiryo',sans-serif"
    font-size="22" font-weight="700" fill="#3D2B1F">診断<tspan fill="#C1714A">Lab</tspan></text>

  <!-- ────── メインコンテンツ ────── -->

  <!-- タイトル -->
  <text x="600" y="290"
    text-anchor="middle"
    font-family="'Hiragino Kaku Gothic ProN','Yu Gothic UI','Meiryo','Noto Sans JP',sans-serif"
    font-size="86" font-weight="700" fill="#3D2B1F" letter-spacing="3">疲れのカルテ</text>

  <!-- サブタイトル -->
  <text x="600" y="356"
    text-anchor="middle"
    font-family="'Hiragino Kaku Gothic ProN','Yu Gothic UI','Meiryo','Noto Sans JP',sans-serif"
    font-size="30" font-weight="500" fill="#C1714A">「なんか疲れた」の正体、わかります。</text>

  <!-- セパレーター -->
  <line x1="380" y1="386" x2="820" y2="386" stroke="#E8D5CE" stroke-width="1.5"/>

  <!-- 説明テキスト -->
  <text x="600" y="422"
    text-anchor="middle"
    font-family="'Hiragino Kaku Gothic ProN','Yu Gothic UI','Meiryo','Noto Sans JP',sans-serif"
    font-size="24" fill="#7A5C52">20の質問で疲れのタイプを診断します</text>

  <!-- バッジ -->
  <rect x="488" y="444" width="224" height="48" rx="24" fill="#FDF0EB" stroke="#E8D5CE" stroke-width="1.5"/>
  <text x="600" y="474"
    text-anchor="middle"
    font-family="'Hiragino Kaku Gothic ProN','Yu Gothic UI','Meiryo','Noto Sans JP',sans-serif"
    font-size="22" font-weight="500" fill="#C1714A">所要時間：約3分</text>

  <!-- URL -->
  <text x="600" y="544"
    text-anchor="middle"
    font-family="'Helvetica Neue','Arial',sans-serif"
    font-size="19" fill="#B0978E" letter-spacing="0.5">shindan-lab.github.io/tsukare-karte</text>

</svg>
