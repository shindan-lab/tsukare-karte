  <script>
const typeColors={A:{gradient:'linear-gradient(135deg,#7C3AED 0%,#A78BFA 100%)'},B:{gradient:'linear-gradient(135deg,#DB2777 0%,#F472B6 100%)'},C:{gradient:'linear-gradient(135deg,#DC2626 0%,#F87171 100%)'},D:{gradient:'linear-gradient(135deg,#D97706 0%,#FBBF24 100%)'},E:{gradient:'linear-gradient(135deg,#2563EB 0%,#60A5FA 100%)'},F:{gradient:'linear-gradient(135deg,#6D28D9 0%,#A78BFA 100%)'},G:{gradient:'linear-gradient(135deg,#059669 0%,#34D399 100%)'},H:{gradient:'linear-gradient(135deg,#6B7280 0%,#9CA3AF 100%)'}};const typeIcons={A:'<svg viewBox="0 0 56 56" xmlns="http://www.w3.org/2000/svg"><path d="M16 17c4 0 8 2 12 7-2 2-5 5-8 8-6-3-8-9-8-15h4z" fill="rgba(255,255,255,.18)" stroke="rgba(255,255,255,.9)" stroke-width="2.2"/></svg>',B:'<svg viewBox="0 0 56 56" xmlns="http://www.w3.org/2000/svg"><path d="M14 18c5 0 8 5 8 12s-3 12-8 12" fill="none" stroke="rgba(255,255,255,.9)" stroke-width="2.5"/><path d="M26 16v24" stroke="rgba(255,255,255,.9)" stroke-width="2.5"/><path d="M32 20c6 0 10 4 10 8s-4 8-10 8" fill="none" stroke="rgba(255,255,255,.9)" stroke-width="2.5"/></svg>',C:'<svg viewBox="0 0 56 56" xmlns="http://www.w3.org/2000/svg"><rect x="10" y="12" width="26" height="18" rx="5" fill="rgba(255,255,255,.15)" stroke="rgba(255,255,255,.9)" stroke-width="2.2"/><path d="M36 18h10" stroke="rgba(255,255,255,.9)" stroke-width="2.2" stroke-linecap="round"/></svg>',D:'<svg viewBox="0 0 56 56" xmlns="http://www.w3.org/2000/svg"><path d="M14 30c4-8 8-12 14-12s10 4 14 12" fill="none" stroke="rgba(255,255,255,.9)" stroke-width="2.5"/><circle cx="28" cy="30" r="4" fill="rgba(255,255,255,.9)"/></svg>',E:'<svg viewBox="0 0 56 56" xmlns="http://www.w3.org/2000/svg"><path d="M20 18c0 10 4 14 8 20 4-6 8-10 8-20" fill="rgba(255,255,255,.15)" stroke="rgba(255,255,255,.9)" stroke-width="2.2"/><circle cx="28" cy="42" r="3" fill="rgba(255,255,255,.9)"/></svg>',F:'<svg viewBox="0 0 56 56" xmlns="http://www.w3.org/2000/svg"><path d="M12 18h18l-8 10 10 10H18" fill="none" stroke="rgba(255,255,255,.9)" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/></svg>',G:'<svg viewBox="0 0 56 56" xmlns="http://www.w3.org/2000/svg"><circle cx="28" cy="22" r="10" fill="rgba(255,255,255,.15)" stroke="rgba(255,255,255,.9)" stroke-width="2.2"/><path d="M18 38c4-4 16-4 20 0" stroke="rgba(255,255,255,.9)" stroke-width="2.4" stroke-linecap="round"/></svg>',H:'<svg viewBox="0 0 56 56" xmlns="http://www.w3.org/2000/svg"><rect x="10" y="12" width="18" height="12" rx="4" fill="rgba(255,255,255,.15)" stroke="rgba(255,255,255,.9)" stroke-width="2.2"/><rect x="28" y="28" width="18" height="12" rx="4" fill="rgba(255,255,255,.15)" stroke="rgba(255,255,255,.9)" stroke-width="2.2"/></svg>'};const Q=[['疲れている時期の自分に、いちばん近いのは？',[['気づいたら人より多く抱えている',{A:3}],['周りの空気や機嫌に疲れやすい',{B:3}],['ちゃんとしなきゃで気が張る',{C:3}],['何が原因かはっきりしないまま重い',{H:3}]]],['頼まれごとが重なるとき、自分に近い反応は？',[['自分で持った方が早いと思ってしまう',{A:3}],['断るより応えようとしてしまう',{F:3}],['本当はきついけど飲み込む',{D:3}],['その時は動けるけど後でどっとくる',{H:2,A:1}]]],['ミスや抜け漏れがあったときに近いのは？',[['かなり引きずってしまう',{C:3}],['どう見られたかがずっと気になる',{F:2,C:1}],['次はもっとちゃんとしようと締める',{C:3}],['反省はするが、必要以上には引きずらない',{}]]],['人間関係で削られやすいのはどんなとき？',[['誰か一人より、全体の空気が重いとき',{B:3}],['相手の期待に応え続けているとき',{F:3}],['言いたいことを飲み込む場面が続くとき',{D:3}],['そこが主な原因ではない',{}]]],['まだ起きていないことのせいで疲れやすいのは？',[['次に何が起きるかを考えすぎるとき',{E:3}],['ちゃんとできるか不安がふくらむとき',{C:2,E:1}],['相手の反応を先回りするとき',{F:2,E:1}],['そこまでは考え込みにくい',{}]]],['休みの日の自分に近いのは？',[['休みでも頭の中が動き続けている',{E:2,G:1}],['何もしていないのに休まった感じがしない',{G:3}],['少し止まると逆にしんどさが見えてくる',{H:3}],['比較的切り替えられる方だ',{}]]],['疲れを自覚するタイミングとして近いのは？',[['かなり溜まってからやっと気づく',{H:3}],['人に言われて初めて気づくことがある',{H:3}],['少しずつ違和感はあるけど流してしまう',{G:2,H:1}],['比較的早めに気づける',{}]]],['「しんどいな」と思いながらも続けてしまうのは？',[['自分で抱えたまま進めること',{A:3}],['周囲に合わせて動き続けること',{B:3}],['期待に応えようと無理すること',{F:3}],['特に思い当たらない',{}]]],['「休めばいいのに休めない」理由として近いのは？',[['自分が止まると回らなくなりそうだから',{A:2,F:1}],['頭の中が止まらないから',{E:3}],['ちゃんと休むことにすら罪悪感があるから',{F:2,C:1}],['何をしたら休んだことになるのか分かりにくいから',{G:2,H:1}]]],['最近の自分に近いのは？',[['ちゃんとしているつもりなのに余裕がない',{C:3}],['人のことばかり気にして疲れる',{B:3}],['本音より先に我慢が出る',{D:3}],['理由は曖昧だけど元気が出にくい',{H:3}]]],['今のしんどさを少し軽くできるなら、いちばん減らしたいのは？',[['自分だけが抱えているもの',{A:3}],['気を張り続けている感じ',{C:2,B:1}],['我慢して飲み込むこと',{D:3}],['休んでも抜けない重さ',{G:2,H:1}]]],['もし明日、自分を少し守るなら一番近いのは？',[['自分で全部持たない',{A:3}],['全部に反応しない',{B:3}],['ちゃんとやりすぎない',{C:3}],['今の疲れをちゃんと見える形にする',{H:3}]]]];const T={A:['抱え込み疲れタイプ','あなたの疲れの正体は、『自分で持ちすぎていること』にあります','頼まれたら断りにくい。任せるより自分でやった方が早い。気づけば、人より少し多く抱えている。そんな流れが当たり前になっていませんか。あなたは、責任感や処理力の高さゆえに、自然と多くを引き受けやすい人です。\n\nそれは能力がある証拠でもあります。でも、持てる人のところには仕事も期待も集まりやすい。今のしんどさは、単に忙しいからではなく、『持ててしまう人』だからこそ起きている構造かもしれません。','ちゃんとやれてしまう人ほど、限界が見えにくいんですよね。周りから見れば頼れる人でも、その中ではずっと息切れしていたはずです。ここまでよく持ちこたえてきました。','今日から一つだけ、頼まれごとに即答しないことを試してみてください。「確認してから返します」を挟むだけでも、抱え込みの流れを少し止められます。'],B:['気づきすぎ疲れタイプ','あなたの疲れの正体は、『見なくていいものまで拾ってしまうこと』です','誰かの機嫌、場の空気、相手のちょっとした変化。あなたは、見えにくいサインを拾える人です。それは本来、気配りや優しさとして働く強みでもあります。\n\nただ、その感度が高いままだと、自分の仕事以外のノイズまで処理し続けることになります。本来は背負わなくていい空気や感情まで拾い続ければ、しんどくなるのは当然です。疲れているのは、気にしすぎだからではなく、気づけてしまうからなんです。','気づけること自体は、あなたの力です。でも、ずっとその感度を開いたままでいると、本当に疲れますよね。敏感さは弱さではありません。','今日は一回だけ、「これは自分の問題ではない」と心の中で切り分けてみてください。全部に反応しなくても大丈夫だと、自分に許可を出すことが回復の入り口になります。'],C:['ちゃんとしすぎ疲れタイプ','あなたの疲れの正体は、『丁寧さが休まず働き続けていること』です','抜け漏れが怖い。確認不足と思われたくない。少しでも不安があると、もう一度見直してしまう。あなたは、物事を雑に扱えない人です。その真面目さが、周囲からの信頼につながってきたことも多いはずです。\n\nただ、その丁寧さがずっとフル稼働だと、心はかなり疲れます。八割で十分な場面でも百点を出そうとしてしまう。今のしんどさは、能力不足ではなく、むしろ『ちゃんとしようとし続けてきた反動』に近いものです。','雑にやれないのは、あなたの誠実さです。その姿勢に助けられてきた人は確実にいます。でも、毎回それを全力でやるのは本当に消耗します。もう少し力を抜いても、大丈夫です。','今日の中で一つだけ、「ここは八割で出す」と決めてみてください。全部を百点でやり続けないことが、長く持つための現実的な工夫になります。'],D:['我慢ぐせ疲れタイプ','あなたの疲れの正体は、『言わずに飲み込むことが積み重なっていること』です','本当は嫌だった。少しつらかった。でも言うほどではないと思ってきた。角が立つより、自分が我慢した方が早い。そんな選択を重ねてきたのではないでしょうか。あなたは、場を壊さないために本音を奥へしまいやすい人です。\n\n言わなかったことは、その場では正解に見えることがあります。でも、飲み込んだ気持ちは消えません。静かに残り続けて、別の疲れとして積もっていきます。今のしんどさは、怠けでも甘えでもなく、ずっと抑えてきた反応が遅れて出てきている状態かもしれません。','よく飲み込んできましたね。言わない方が丸く収まるとわかっている人ほど、自分の中だけが荒れていくんです。あなたはちゃんと、しんどくていいです。','いきなり全部言わなくて大丈夫です。まずはノートやスマホのメモに、「本当は嫌だったこと」を一つだけ書いてみてください。外に出すだけでも、かなり違います。'],E:['考えすぎ疲れタイプ','あなたの疲れの正体は、『まだ起きていないことまで先に働いていること』です','これを言ったらどう思われるか。失敗したらどうなるか。次に何が起きそうか。まだ現実には起きていないことを、先に何パターンも考えてしまう。あなたは、先を読む力が強い人です。\n\nその力は本来、有能さでもあります。危険を避けたり、準備を整えたりするのに役立つからです。でも、先回りが強すぎると、実際の出来事より「想像の中の仕事」で疲れてしまいます。心が休まらないのは、常に少し先の未来で働いているからなんです。','ちゃんと備えようとしてきたんですよね。考えすぎと言われても、考えないと不安だった。その慎重さに助けられてきた場面も、きっとたくさんありました。','不安が出たら、「今すぐできること」と「まだ考えなくていいこと」に分けてみてください。先の全部を今日処理しようとしないだけで、かなり楽になります。'],F:['期待に応えすぎ疲れタイプ','あなたの疲れの正体は、『期待に応えようとし続けてきたこと』です','ちゃんとしていたい。がっかりさせたくない。頼まれたら応えたい。あなたは、相手の期待に自然と応えようとする人です。その姿勢は信頼にもつながってきたはずです。\n\nでも、応えることが続きすぎると、「自分がどうしたいか」より「どう見られるか」「どう期待されているか」が先に立ちやすくなります。今のしんどさは、怠けでもわがままでもなく、ずっと期待に合わせてきた反動かもしれません。','期待に応えられる人ほど、自分の疲れを後回しにしやすいんですよね。ちゃんとしてきたからこそ、今しんどいのは自然なことです。','今日は一つだけ、「相手が望みそうなこと」ではなく「今の自分に無理がないこと」を基準に選んでみてください。小さくても、自分に戻る練習になります。'],G:['余白不足疲れタイプ','あなたの疲れの正体は、『休んでいるようで休めていないこと』です','予定があるわけではない。でも気が休まらない。何もしない時間があっても、情報を見たり考えごとをしたりして、頭の中が止まらない。あなたは、体より先に「余白の不足」で消耗しやすい人かもしれません。\n\nこのタイプに必要なのは、派手な気分転換ではなく、まず反応を減らすことです。何かを足すより、少し引く。予定、情報、判断、会話。そうした刺激を減らしてはじめて、心が戻ってきやすいタイプです。','何もしない時間が必要なのは、甘えではなく回復の条件なんですよね。余白がないまま走ってきたなら、しんどくなるのは当然です。','今日は10分だけでも「何も足さない時間」をつくってみてください。スマホを閉じて、予定も考えず、ただ静かに過ごす。それだけでも十分です。'],H:['理由の見えない消耗タイプ','あなたの疲れの正体は、『しんどさを感じる余白まで失っていること』かもしれません','明確にこれが原因、と言い切れない。でも元気が出にくい。休んでも戻りきらない。何がつらいのか自分でもはっきりしない。そんな状態が続いているなら、あなたは“理由の見えない消耗”が積み重なっているタイプかもしれません。\n\n人は限界に近づくと、むしろ鈍くなることがあります。危険信号を感じにくくなるんです。だから「まだ動けている」ことと「大丈夫」は同じではありません。今のあなたに必要なのは、もっと頑張ることではなく、まず自分の状態を見える形にすることです。','気づけないくらい、ずっと頑張ってきたんですよね。しんどさに理由がつかないからといって、軽いわけではありません。まずは「今つらいかもしれない」と認めるだけでも大事な一歩です。','今日は帰宅後に、「今の疲れを10点満点で何点か」だけつけてみてください。曖昧な消耗を数字にするだけでも、自分の状態は見えやすくなります。']};function calc(){const s={A:0,B:0,C:0,D:0,E:0,F:0,G:0,H:0};answers.forEach(a=>Object.entries(a).forEach(([k,v])=>s[k]+=v));const x=Object.entries(s).sort((a,b)=>b[1]-a[1]);return{main:x[0][0],sub:x[1][0]}}function share(main){const url='https://shindan-lab.github.io/tsukare-karte/';return `私の疲れ方は「${T[main][0]}」でした。\n「なんかしんどい」の正体、これだったのかも。\n\n▼疲れのカルテ\n${url}\n\n#疲れのカルテ #診断Lab`}let i=0,answers=[];function sc(id){['top','quiz','loading','result'].forEach(x=>document.getElementById(x).classList.add('hide'));document.getElementById(id).classList.remove('hide');window.scrollTo({top:0,behavior:'instant'})}function render(){document.getElementById('ptext').textContent=`${i+1} / ${Q.length}`;document.getElementById('pbar').style.width=((i+1)/Q.length*100)+'%';document.getElementById('backbtn').disabled=i===0;document.getElementById('q').textContent=Q[i][0];const o=document.getElementById('opts');o.innerHTML='';Q[i][1].forEach(it=>{const b=document.createElement('button');b.className='opt';b.textContent=it[0];b.onclick=()=>{answers[i]=it[1];if(i<Q.length-1){i++;render()}else{sc('loading');setTimeout(show,1200)}};o.appendChild(b)})}function start(){i=0;answers=[];sc('quiz');render()}function back(){if(i>0){i--;render()}}function show(){const r=calc(),m=T[r.main];document.getElementById('result-header-card').style.background=typeColors[r.main].gradient;document.getElementById('result-bg-letter').textContent=r.main;document.getElementById('result-icon').innerHTML=typeIcons[r.main];document.getElementById('result-type-name').textContent=m[0];document.getElementById('headline').textContent=m[1];document.getElementById('body').innerHTML=m[2].split('\n\n').map(x=>`<p>${x}</p>`).join('');document.getElementById('letter').textContent=m[3];document.getElementById('pres').textContent=m[4];const affiliate=(typeof affiliateData!=='undefined'&&affiliateData&&affiliateData[r.main]&&typeof affiliateData[r.main].url==='string'&&affiliateData[r.main].url.trim()!=='')?affiliateData[r.main]:null;if(affiliate){document.getElementById('aff').classList.remove('hide');document.getElementById('afft').textContent=affiliate.title;document.getElementById('affd').textContent=affiliate.desc;document.getElementById('afflink').href=affiliate.url}else{document.getElementById('aff').classList.add('hide')}const sh=encodeURIComponent(share(r.main));document.getElementById('sx').href='https://twitter.com/intent/tweet?text='+sh;document.getElementById('st').href='https://www.threads.net/intent/post?text='+sh;sc('result')}function resetQuiz(){sc('top')}
