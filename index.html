<!doctype html><html lang='ja'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1,viewport-fit=cover'><title>疲れのカルテ</title><meta name='description' content='12の質問で、今のあなたが抱えやすい疲れ方や、その疲れの出方がわかる読み物型診断ツールです。所要時間約2分。'><link rel='canonical' href='https://shindan-lab.github.io/tsukare-karte/'><link rel='icon' href='favicon.png'><meta property='og:title' content='疲れのカルテ｜「なんかしんどい」の正体、少し見えてきます。'><meta property='og:description' content='12の質問で、今のあなたが抱えやすい疲れ方や、その疲れの出方がわかる読み物型診断ツールです。所要時間約2分。'><meta property='og:url' content='https://shindan-lab.github.io/tsukare-karte/'><meta property='og:type' content='website'><meta property='og:image' content='https://shindan-lab.github.io/tsukare-karte/og-image.png'><meta name='twitter:card' content='summary_large_image'><meta name='twitter:title' content='疲れのカルテ｜「なんかしんどい」の正体、少し見えてきます。'><meta name='twitter:description' content='12の質問で、今のあなたが抱えやすい疲れ方や、その疲れの出方がわかる読み物型診断ツールです。'><meta name='twitter:image' content='https://shindan-lab.github.io/tsukare-karte/og-image.png'><meta name='theme-color' content='#C1714A'><meta property='og:locale' content='ja_JP'><meta property='og:site_name' content='疲れのカルテ'><meta property='og:image:width' content='1200'><meta property='og:image:height' content='630'><link rel='preconnect' href='https://fonts.googleapis.com'><link rel='preconnect' href='https://fonts.gstatic.com' crossorigin><link href='https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap' rel='stylesheet'><style>body{font-family:"Noto Sans JP","Hiragino Kaku Gothic ProN",sans-serif;background:#FAF7F4;color:#3D2B1F;margin:0}main{max-width:480px;margin:0 auto;padding:24px 16px 48px}.card{background:#fff;border:1px solid #E8D5CE;border-radius:16px;padding:20px;margin-bottom:14px}.btn,.opt{display:block;width:100%;min-height:44px;border-radius:12px;font:inherit}.btn{border:none;background:#C1714A;color:#fff;padding:16px;cursor:pointer}.opt{background:#FAF7F4;border:1px solid #E8D5CE;color:#3D2B1F;text-align:left;padding:14px;margin:8px 0;cursor:pointer}.hide{display:none}.sub{color:#7A5C52}.center{text-align:center}.bar{height:4px;background:#E8D5CE;border-radius:4px;overflow:hidden}.fill{height:100%;background:#C1714A}.pill{display:inline-block;background:#FDF0EB;border:1px solid #E8D5CE;border-radius:999px;padding:4px 12px;color:#C1714A;font-size:13px}.label{font-size:11px;letter-spacing:.14em;color:#C1714A;font-weight:700;margin-bottom:10px}.hero{padding-top:40px}.h1{font-size:32px;font-weight:700;margin:0 0 8px}.h2{font-size:22px;font-weight:700;margin:0 0 8px}.typehead{border-radius:20px;padding:24px;color:#fff;margin-bottom:14px}.share a{display:inline-block;width:48%;text-align:center;background:#1A1A1A;color:#fff;text-decoration:none;padding:12px 0;border-radius:12px}@keyframes spin{to{transform:rotate(360deg)}}</style></head><body><main><section id='top' class='hero center'><a href='https://shindan-lab.github.io/' style='letter-spacing:.18em;color:#C1714A;font-size:12px;margin-bottom:12px;text-decoration:none;display:block'>診断Lab</a><h1 class='h1'>疲れのカルテ</h1><p style='color:#C1714A;font-weight:500'>「なんかしんどい」の正体、少し見えてきます。</p><div class='card' style='text-align:left'><p class='sub'>12の質問に答えるだけで、今のあなたが抱えやすい疲れ方や、その疲れの出方がわかります。</p><div style='margin-top:12px'><span class='pill'>所要時間：約2分</span></div></div><button class='btn' onclick='start()'>診断をはじめる</button></section><section id='quiz' class='hide'><div class='sub' id='ptext'>1 / 12</div><div class='bar'><div class='fill' id='pbar' style='width:8.3%'></div></div><div style='margin:10px 0'><button onclick='back()' id='backbtn' style='background:none;border:none;color:#7A5C52;padding:0'>前の問題に戻る</button></div><div class='card'><div id='q' style='font-weight:700;line-height:1.7'></div><div id='opts'></div></div></section><section id='loading' class='hide center' style='padding-top:100px'><div style='width:48px;height:48px;border:4px solid #E8D5CE;border-top-color:#C1714A;border-radius:50%;animation:spin .9s linear infinite;margin:0 auto 24px'></div><div class='sub' style='font-size:16px;font-weight:500'>今のあなたの疲れ方を分析中…</div></section><section id='result' class='hide'><div id='head' class='typehead'></div><div class='card'><div class='label'>診断結果</div><div id='headline' style='font-weight:700;line-height:1.7;margin-bottom:12px'></div><div id='body' style='line-height:1.9'></div></div><div class='card' style='background:#FDF0EB'><div class='label'>あなたへ</div><div id='letter' style='line-height:1.9'></div></div><div class='card' style='border:2px solid #C1714A'><div class='label'>今日からできること</div><div id='pres' style='line-height:1.9'></div></div><div id='subtype' class='card sub hide'></div><div id='aff' class='card hide'><div style='display:flex;align-items:center;gap:8px;margin-bottom:10px'><div class='label' style='margin-bottom:0'>もし気になったら</div><span style='font-size:9px;font-weight:700;color:#B0978E;background:#F0E4DE;padding:2px 6px;border-radius:3px;letter-spacing:.05em'>PR</span></div><a id='afflink' target='_blank' rel='noopener noreferrer' style='text-decoration:none;color:inherit'><div id='afft' style='font-weight:700'></div><div id='affd' class='sub' style='margin-top:6px'></div><div style='margin-top:10px;color:#BF4500;font-weight:700'>楽天で見る →</div></a></div><div class='share'><a id='sx' target='_blank' rel='noopener noreferrer'>Xでシェア</a> <a id='st' target='_blank' rel='noopener noreferrer'>Threadsでシェア</a></div><button class='btn' style='margin-top:12px;background:#fff;color:#7A5C52;border:1px solid #E8D5CE' onclick='resetQuiz()'>もう一度診断する</button></section><footer style='margin-top:56px;padding:28px 0 20px;text-align:center;border-top:1px solid #E8D5CE'><div style='font-size:17px;font-weight:700;color:#3D2B1F;margin-bottom:10px'>診断<em style='font-style:normal;color:#C1714A'>Lab</em></div><div style='font-size:12px;color:#7A5C52;margin-bottom:14px'>あなたの「なんか」を、言葉にする。</div><div style='font-size:11px;color:#B0978E'>© 2025 診断Lab</div></footer></main><script src='affiliate.js'></script><script>const C={A:'#7C3AED',B:'#DB2777',C:'#DC2626',D:'#D97706',E:'#2563EB',F:'#6D28D9',G:'#059669',H:'#6B7280'};const Q=[['疲れている時期の自分に、いちばん近いのは？',[['気づいたら人より多く抱えている',{A:3}],['周りの空気や機嫌に疲れやすい',{B:3}],['ちゃんとしなきゃで気が張る',{C:3}],['何が原因かはっきりしないまま重い',{H:3}]]],['頼まれごとが重なるとき、自分に近い反応は？',[['自分で持った方が早いと思ってしまう',{A:3}],['断るより応えようとしてしまう',{F:3}],['本当はきついけど飲み込む',{D:3}],['その時は動けるけど後でどっとくる',{H:2,A:1}]]],['ミスや抜け漏れがあったときに近いのは？',[['かなり引きずってしまう',{C:3}],['どう見られたかがずっと気になる',{F:2,C:1}],['次はもっとちゃんとしようと締める',{C:3}],['反省はするが、必要以上には引きずらない',{}]]],['人間関係で削られやすいのはどんなとき？',[['誰か一人より、全体の空気が重いとき',{B:3}],['相手の期待に応え続けているとき',{F:3}],['言いたいことを飲み込む場面が続くとき',{D:3}],['そこが主な原因ではない',{}]]],['まだ起きていないことのせいで疲れやすいのは？',[['次に何が起きるかを考えすぎるとき',{E:3}],['ちゃんとできるか不安がふくらむとき',{C:2,E:1}],['相手の反応を先回りするとき',{F:2,E:1}],['そこまでは考え込みにくい',{}]]],['休みの日の自分に近いのは？',[['休みでも頭の中が動き続けている',{E:2,G:1}],['何もしていないのに休まった感じがしない',{G:3}],['少し止まると逆にしんどさが見えてくる',{H:3}],['比較的切り替えられる方だ',{}]]],['疲れを自覚するタイミングとして近いのは？',[['かなり溜まってからやっと気づく',{H:3}],['人に言われて初めて気づくことがある',{H:3}],['少しずつ違和感はあるけど流してしまう',{G:2,H:1}],['比較的早めに気づける',{}]]],['「しんどいな」と思いながらも続けてしまうのは？',[['自分で抱えたまま進めること',{A:3}],['周囲に合わせて動き続けること',{B:3}],['期待に応えようと無理すること',{F:3}],['特に思い当たらない',{}]]],['「休めばいいのに休めない」理由として近いのは？',[['自分が止まると回らなくなりそうだから',{A:2,F:1}],['頭の中が止まらないから',{E:3}],['ちゃんと休むことにすら罪悪感があるから',{F:2,C:1}],['何をしたら休んだことになるのか分かりにくいから',{G:2,H:1}]]],['最近の自分に近いのは？',[['ちゃんとしているつもりなのに余裕がない',{C:3}],['人のことばかり気にして疲れる',{B:3}],['本音より先に我慢が出る',{D:3}],['理由は曖昧だけど元気が出にくい',{H:3}]]],['今のしんどさを少し軽くできるなら、いちばん減らしたいのは？',[['自分だけが抱えているもの',{A:3}],['気を張り続けている感じ',{C:2,B:1}],['我慢して飲み込むこと',{D:3}],['休んでも抜けない重さ',{G:2,H:1}]]],['もし明日、自分を少し守るなら一番近いのは？',[['自分で全部持たない',{A:3}],['全部に反応しない',{B:3}],['ちゃんとやりすぎない',{C:3}],['今の疲れをちゃんと見える形にする',{H:3}]]]];const T={A:['抱え込み疲れタイプ','あなたの疲れの正体は、『自分で持ちすぎていること』にあります','頼まれたら断りにくい。任せるより自分でやった方が早い。気づけば、人より少し多く抱えている。そんな流れが当たり前になっていませんか。あなたは、責任感や処理力の高さゆえに、自然と多くを引き受けやすい人です。\n\nそれは能力がある証拠でもあります。でも、持てる人のところには仕事も期待も集まりやすい。今のしんどさは、単に忙しいからではなく、『持ててしまう人』だからこそ起きている構造かもしれません。','ちゃんとやれてしまう人ほど、限界が見えにくいんですよね。周りから見れば頼れる人でも、その中ではずっと息切れしていたはずです。ここまでよく持ちこたえてきました。','今日から一つだけ、頼まれごとに即答しないことを試してみてください。「確認してから返します」を挟むだけでも、抱え込みの流れを少し止められます。'],B:['気づきすぎ疲れタイプ','あなたの疲れの正体は、『見なくていいものまで拾ってしまうこと』です','誰かの機嫌、場の空気、相手のちょっとした変化。あなたは、見えにくいサインを拾える人です。それは本来、気配りや優しさとして働く強みでもあります。\n\nただ、その感度が高いままだと、自分の仕事以外のノイズまで処理し続けることになります。本来は背負わなくていい空気や感情まで拾い続ければ、しんどくなるのは当然です。疲れているのは、気にしすぎだからではなく、気づけてしまうからなんです。','気づけること自体は、あなたの力です。でも、ずっとその感度を開いたままでいると、本当に疲れますよね。敏感さは弱さではありません。','今日は一回だけ、「これは自分の問題ではない」と心の中で切り分けてみてください。全部に反応しなくても大丈夫だと、自分に許可を出すことが回復の入り口になります。'],C:['ちゃんとしすぎ疲れタイプ','あなたの疲れの正体は、『丁寧さが休まず働き続けていること』です','抜け漏れが怖い。確認不足と思われたくない。少しでも不安があると、もう一度見直してしまう。あなたは、物事を雑に扱えない人です。その真面目さが、周囲からの信頼につながってきたことも多いはずです。\n\nただ、その丁寧さがずっとフル稼働だと、心はかなり疲れます。八割で十分な場面でも百点を出そうとしてしまう。今のしんどさは、能力不足ではなく、むしろ『ちゃんとしようとし続けてきた反動』に近いものです。','雑にやれないのは、あなたの誠実さです。その姿勢に助けられてきた人は確実にいます。でも、毎回それを全力でやるのは本当に消耗します。もう少し力を抜いても、大丈夫です。','今日の中で一つだけ、「ここは八割で出す」と決めてみてください。全部を百点でやり続けないことが、長く持つための現実的な工夫になります。'],D:['我慢ぐせ疲れタイプ','あなたの疲れの正体は、『言わずに飲み込むことが積み重なっていること』です','本当は嫌だった。少しつらかった。でも言うほどではないと思ってきた。角が立つより、自分が我慢した方が早い。そんな選択を重ねてきたのではないでしょうか。あなたは、場を壊さないために本音を奥へしまいやすい人です。\n\n言わなかったことは、その場では正解に見えることがあります。でも、飲み込んだ気持ちは消えません。静かに残り続けて、別の疲れとして積もっていきます。今のしんどさは、怠けでも甘えでもなく、ずっと抑えてきた反応が遅れて出てきている状態かもしれません。','よく飲み込んできましたね。言わない方が丸く収まるとわかっている人ほど、自分の中だけが荒れていくんです。あなたはちゃんと、しんどくていいです。','いきなり全部言わなくて大丈夫です。まずはノートやスマホのメモに、「本当は嫌だったこと」を一つだけ書いてみてください。外に出すだけでも、かなり違います。'],E:['考えすぎ疲れタイプ','あなたの疲れの正体は、『まだ起きていないことまで先に働いていること』です','これを言ったらどう思われるか。失敗したらどうなるか。次に何が起きそうか。まだ現実には起きていないことを、先に何パターンも考えてしまう。あなたは、先を読む力が強い人です。\n\nその力は本来、有能さでもあります。危険を避けたり、準備を整えたりするのに役立つからです。でも、先回りが強すぎると、実際の出来事より「想像の中の仕事」で疲れてしまいます。心が休まらないのは、常に少し先の未来で働いているからなんです。','ちゃんと備えようとしてきたんですよね。考えすぎと言われても、考えないと不安だった。その慎重さに助けられてきた場面も、きっとたくさんありました。','不安が出たら、「今すぐできること」と「まだ考えなくていいこと」に分けてみてください。先の全部を今日処理しようとしないだけで、かなり楽になります。'],F:['期待に応えすぎ疲れタイプ','あなたの疲れの正体は、『期待に応えようとし続けてきたこと』です','ちゃんとしていたい。がっかりさせたくない。頼まれたら応えたい。あなたは、相手の期待に自然と応えようとする人です。その姿勢は信頼にもつながってきたはずです。\n\nでも、応えることが続きすぎると、「自分がどうしたいか」より「どう見られるか」「どう期待されているか」が先に立ちやすくなります。今のしんどさは、怠けでもわがままでもなく、ずっと期待に合わせてきた反動かもしれません。','期待に応えられる人ほど、自分の疲れを後回しにしやすいんですよね。ちゃんとしてきたからこそ、今しんどいのは自然なことです。','今日は一つだけ、「相手が望みそうなこと」ではなく「今の自分に無理がないこと」を基準に選んでみてください。小さくても、自分に戻る練習になります。'],G:['余白不足疲れタイプ','あなたの疲れの正体は、『休んでいるようで休めていないこと』です','予定があるわけではない。でも気が休まらない。何もしない時間があっても、情報を見たり考えごとをしたりして、頭の中が止まらない。あなたは、体より先に「余白の不足」で消耗しやすい人かもしれません。\n\nこのタイプに必要なのは、派手な気分転換ではなく、まず反応を減らすことです。何かを足すより、少し引く。予定、情報、判断、会話。そうした刺激を減らしてはじめて、心が戻ってきやすいタイプです。','何もしない時間が必要なのは、甘えではなく回復の条件なんですよね。余白がないまま走ってきたなら、しんどくなるのは当然です。','今日は10分だけでも「何も足さない時間」をつくってみてください。スマホを閉じて、予定も考えず、ただ静かに過ごす。それだけでも十分です。'],H:['理由の見えない消耗タイプ','あなたの疲れの正体は、『しんどさを感じる余白まで失っていること』かもしれません','明確にこれが原因、と言い切れない。でも元気が出にくい。休んでも戻りきらない。何がつらいのか自分でもはっきりしない。そんな状態が続いているなら、あなたは“理由の見えない消耗”が積み重なっているタイプかもしれません。\n\n人は限界に近づくと、むしろ鈍くなることがあります。危険信号を感じにくくなるんです。だから「まだ動けている」ことと「大丈夫」は同じではありません。今のあなたに必要なのは、もっと頑張ることではなく、まず自分の状態を見える形にすることです。','気づけないくらい、ずっと頑張ってきたんですよね。しんどさに理由がつかないからといって、軽いわけではありません。まずは「今つらいかもしれない」と認めるだけでも大事な一歩です。','今日は帰宅後に、「今の疲れを10点満点で何点か」だけつけてみてください。曖昧な消耗を数字にするだけでも、自分の状態は見えやすくなります。']};function calc(){const s={A:0,B:0,C:0,D:0,E:0,F:0,G:0,H:0};answers.forEach(a=>Object.entries(a).forEach(([k,v])=>s[k]+=v));const x=Object.entries(s).sort((a,b)=>b[1]-a[1]);return{main:x[0][0],sub:x[1][0]}}function share(main){const url='https://shindan-lab.github.io/tsukare-karte/';return `私の疲れ方は「${T[main][0]}」でした。\n「なんかしんどい」の正体、これだったのかも。\n\n▼疲れのカルテ\n${url}\n\n#疲れのカルテ #診断Lab`}let i=0,answers=[];function sc(id){['top','quiz','loading','result'].forEach(x=>document.getElementById(x).classList.add('hide'));document.getElementById(id).classList.remove('hide');window.scrollTo({top:0,behavior:'instant'})}function render(){document.getElementById('ptext').textContent=`${i+1} / ${Q.length}`;document.getElementById('pbar').style.width=((i+1)/Q.length*100)+'%';document.getElementById('backbtn').disabled=i===0;document.getElementById('q').textContent=Q[i][0];const o=document.getElementById('opts');o.innerHTML='';Q[i][1].forEach(it=>{const b=document.createElement('button');b.className='opt';b.textContent=it[0];b.onclick=()=>{answers[i]=it[1];if(i<Q.length-1){i++;render()}else{sc('loading');setTimeout(show,1200)}};o.appendChild(b)})}function start(){i=0;answers=[];sc('quiz');render()}function back(){if(i>0){i--;render()}}function show(){const r=calc(),m=T[r.main],s=T[r.sub];document.getElementById('head').style.background=C[r.main];document.getElementById('head').innerHTML=`<div style='font-size:11px;letter-spacing:.18em;opacity:.9'>あなたの疲れタイプ</div><div class='h2'>${m[0]}</div>`;document.getElementById('headline').textContent=m[1];document.getElementById('body').innerHTML=m[2].split('\n\n').map(x=>`<p>${x}</p>`).join('');document.getElementById('letter').textContent=m[3];document.getElementById('pres').textContent=m[4];const st=document.getElementById('subtype');st.textContent=`今のあなたには「${s[0]}」の傾向も少しあります。`;st.classList.remove('hide');if(typeof affiliateData!=='undefined'&&affiliateData[r.main]&&affiliateData[r.main].url){document.getElementById('aff').classList.remove('hide');document.getElementById('afft').textContent=affiliateData[r.main].title;document.getElementById('affd').textContent=affiliateData[r.main].desc;document.getElementById('afflink').href=affiliateData[r.main].url}else{document.getElementById('aff').classList.add('hide')}const sh=encodeURIComponent(share(r.main));document.getElementById('sx').href='https://twitter.com/intent/tweet?text='+sh;document.getElementById('st').href='https://www.threads.net/intent/post?text='+sh;sc('result')}function resetQuiz(){sc('top')}</script></body></html>
